<!DOCTYPE html>
<!-- Define que o documento utiliza o padrão HTML5 -->

<html lang="pt-br">
<!-- Início do documento HTML e definição do idioma como português do Brasil -->

<head class="body">
    <!-- Cabeçalho do documento (configurações e imports) -->

    <meta charset="UTF-8">
    <!-- Define o padrão de caracteres como UTF-8 (permite acentos e caracteres especiais) -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Faz a página se adaptar corretamente a diferentes tamanhos de tela -->

    <title>Cielo</title>
    <!-- Título da página que aparece na aba do navegador -->

    <link rel="stylesheet" href="public/style.css">
    <!-- Importa um arquivo CSS externo para estilização -->


    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
    <!-- Importa a biblioteca Phaser (usada para criar jogos) -->
    <script type="module" src="public/player.js"></script>

    <script type="module" src="public/menuScene.js"></script>
    <!-- Importa o arquivo responsável pela cena de menu do jogo -->

    <script type="module" src="public/gameScene.js"></script>


    <script type="module" src='public/quizPadaria.js'></script>

    <script src="public/satisfacaoUI.js"></script>

    <script src="public/padariaScene.js"></script>

    <script type="module" src="public/script.js"></script>
    <!-- Importa o arquivo principal que inicializa o jogo -->
</head>

<body>
    <!-- Corpo da página (conteúdo visível) -->

    <div id="game"></div>
    <!-- Div onde o Phaser vai inserir o canvas do jogo -->

    <div id="ui" class="hidden">
        <!-- Interface do usuário, começa escondida por causa da classe 'hidden' -->

        <div class="card">
            <!-- Container visual para organizar a interface -->

            <h2 id="question">Pergunta aqui</h2>
            <!-- Exibe a pergunta do jogo (texto alterado via JavaScript) -->

            <div id="answers"></div>
            <!-- Espaço onde as alternativas de resposta serão inseridas -->

            <p id="score">Pontos: 0</p>
            <!-- Mostra a pontuação do jogador -->
        </div>
    </div>

    <!-- Quiz da Padaria -->
    <div id="quiz-padaria" class="quiz-overlay hidden">
        <div class="quiz-modal">
            <!-- Barra de satisfação (dentro do modal) -->
            <div id="satisfacao" class="satisfacao-container hidden">
                <div class="satisfacao-track">
                    <div id="satisfacao-fill" class="satisfacao-fill" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                </div>
            </div>
            <div class="quiz-header">
                <span id="quiz-timer" class="quiz-timer">15s</span>
                <h2 id="quiz-pergunta" class="quiz-pergunta">Pergunta aqui</h2>
            </div>
            <!-- Corpo do quiz -->
            <div class="quiz-body">
                <!-- Imagem do NPC -->
                <div class="quiz-npc">
                    <img id="quiz-npc-img" src="public/assets/npc.png" alt="NPC">
                    <span class="quiz-npc-nome">João</span>
                </div>

                <!-- Alternativas -->
                <div id="quiz-alternativas" class="quiz-alternativas">
                    <button class="quiz-btn" data-index="0">a) Alternativa 1</button>
                    <button class="quiz-btn" data-index="1">b) Alternativa 2</button>
                    <button class="quiz-btn" data-index="2">c) Alternativa 3</button>
                    <button class="quiz-btn" data-index="3">d) Alternativa 4</button>
                </div>
            </div>
            <!-- Feedback (acerto/erro) -->
            <div id="quiz-feedback" class="quiz-feedback hidden">
                <p id="quiz-feedback-texto"></p>
            </div>
        </div>
    </div>

</body>
<!-- Fim do corpo da página -->

</html>
<!-- Fim do documento HTML -->
